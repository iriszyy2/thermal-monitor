<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>&#31454;&#21697;&#30417;&#25511;</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f4ef;color:#1a1a18;font-size:14px;line-height:1.5}
.topbar{background:#fff;border-bottom:1px solid #e5e3dc;padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.tl{display:flex;align-items:center;gap:9px}
.pulse{width:8px;height:8px;border-radius:50%;background:#22c55e}
.ttitle{font-size:15px;font-weight:600}
.tmeta{font-size:12px;color:#78776f;margin-top:1px}
.btn{font-size:12px;font-weight:500;padding:6px 14px;border-radius:8px;border:1px solid #e5e3dc;background:#fff;color:#1a1a18;cursor:pointer}
.btn:hover{background:#efede8}
.page{max-width:1060px;margin:0 auto;padding:24px 20px}
.alert{background:#fef3c7;border:1px solid #fbbf24;border-radius:10px;padding:10px 16px;display:flex;align-items:center;gap:9px;margin-bottom:20px;font-size:13px;color:#92400e}
.alert.hidden,.hidden{display:none}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:24px}
.stat{background:#efede8;border-radius:10px;padding:14px 16px}
.slabel{font-size:11px;color:#78776f;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.sval{font-size:24px;font-weight:600;color:#1a1a18}
.sval.amber{color:#b45309}
.sval.green{color:#16a34a;font-size:16px;padding-top:4px}
.ssub{font-size:11px;color:#78776f;margin-top:3px}
.tabs{display:flex;border-bottom:1px solid #e5e3dc;margin-bottom:20px}
.tab{font-size:13px;font-weight:500;padding:7px 16px 10px;color:#78776f;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px}
.tab.active{color:#1a1a18;border-bottom-color:#1a1a18}
.filters{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.fbtn{font-size:12px;padding:4px 12px;border-radius:16px;border:1px solid #e5e3dc;background:#fff;color:#78776f;cursor:pointer}
.fbtn.active{background:#1a1a18;color:#fff;border-color:#1a1a18}
.grid{display:grid;grid-template-columns:1fr 300px;gap:16px}
.panel{background:#fff;border:1px solid #e5e3dc;border-radius:12px;overflow:hidden;margin-bottom:14px}
.panel:last-child{margin-bottom:0}
.ph{padding:12px 16px;border-bottom:1px solid #e5e3dc;display:flex;align-items:center;justify-content:space-between}
.ptitle{font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px}
.badge{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600}
.b-amber{background:#fef3c7;color:#b45309}
.b-gray{background:#efede8;color:#78776f}
.item{display:flex;align-items:flex-start;gap:10px;padding:12px 16px;border-bottom:1px solid #f5f4ef}
.item:last-child{border-bottom:none}
.item:hover{background:#f5f4ef}
.tag{font-size:10px;font-weight:700;padding:3px 7px;border-radius:5px;flex-shrink:0;margin-top:1px;letter-spacing:.03em}
.tag-NEW{background:#dcfce7;color:#15803d}
.tag-PRICE{background:#fef3c7;color:#b45309}
.tag-STOCK{background:#dbeafe;color:#1d4ed8}
.tag-REMOVED{background:#fee2e2;color:#b91c1c}
.tag-BLOG{background:#ede9fe;color:#6d28d9}
.tag-PAGE{background:#ccfbf1;color:#0f766e}
.tag-NAV{background:#fce7f3;color:#be185d}
.ibody{flex:1;min-width:0}
.ibrand{font-size:10px;color:#78776f;text-transform:uppercase;letter-spacing:.04em;margin-bottom:1px}
.iname{font-size:13px;font-weight:500;color:#1a1a18;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.iname a{color:#1d4ed8;text-decoration:none}
.iname a:hover{text-decoration:underline}
.idetail{font-size:12px;color:#78776f}
.itime{font-size:11px;color:#78776f;white-space:nowrap;flex-shrink:0;margin-top:2px}
.diff-block{margin-top:6px;border-radius:6px;overflow:hidden;border:1px solid #e5e3dc}
.diff-line{font-size:11px;font-family:ui-monospace,SFMono-Regular,Consolas,monospace;padding:3px 8px;line-height:1.6;word-break:break-word}
.diff-added{background:#f0fdf4;color:#15803d;border-left:3px solid #86efac}
.diff-removed{background:#fef2f2;color:#b91c1c;border-left:3px solid #fca5a5}
.diff-modified{background:#fffbeb;color:#92400e;border-left:3px solid #fcd34d}
.pr{display:flex;align-items:center;justify-content:space-between;padding:9px 16px;border-bottom:1px solid #f5f4ef;font-size:13px}
.pr:last-child{border-bottom:none}
.pname{font-weight:500;color:#1a1a18}
.pname a{color:#1a1a18;text-decoration:none}
.pbrand{font-size:11px;color:#78776f}
.sok,.schanged,.serr{font-size:11px;font-weight:600;white-space:nowrap;margin-left:8px}
.sok{color:#16a34a}
.schanged{color:#b45309}
.serr{color:#b91c1c}
.brand-row{display:flex;align-items:center;justify-content:space-between;padding:9px 16px;border-bottom:1px solid #f5f4ef;cursor:pointer}
.brand-row:last-child{border-bottom:none}
.brand-row:hover{background:#f5f4ef}
.bcnt{font-size:11px;background:#efede8;color:#78776f;padding:2px 9px;border-radius:10px}
.empty{padding:32px 16px;text-align:center;color:#78776f;font-size:13px}
@media(max-width:720px){.stats{grid-template-columns:repeat(2,1fr)}.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="topbar">
  <div class="tl">
    <div class="pulse"></div>
    <div>
      <div class="ttitle">&#31454;&#21697;&#30417;&#25511; Dashboard</div>
      <div class="tmeta" id="meta">&#21152;&#36733;&#20013;...</div>
    </div>
  </div>
  <button class="btn" onclick="loadData()">&#21047;&#26032;</button>
</div>
<div class="page">
  <div class="alert hidden" id="alert"><span>&#25552;&#31034;</span><span id="alert-text"></span></div>
  <div class="stats">
    <div class="stat"><div class="slabel">&#30417;&#25511;&#21697;&#29260;</div><div class="sval" id="s-brands">-</div><div class="ssub" id="s-brands-sub">-</div></div>
    <div class="stat"><div class="slabel">&#20170;&#26085;&#21464;&#21270;</div><div class="sval amber" id="s-today">-</div><div class="ssub">&#36807;&#21435; 24 &#23567;&#26102;</div></div>
    <div class="stat"><div class="slabel">&#26412;&#21608;&#21464;&#21270;</div><div class="sval" id="s-week">-</div><div class="ssub">&#36807;&#21435; 7 &#22825;</div></div>
    <div class="stat"><div class="slabel">&#31995;&#32479;&#29366;&#24577;</div><div class="sval green">&#27491;&#24120;</div><div class="ssub" id="s-time">-</div></div>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="switchTab('log',this)">&#21464;&#21270;&#26085;&#24535;</div>
    <div class="tab" onclick="switchTab('brands',this)">&#21697;&#29260;&#27010;&#35272;</div>
  </div>
  <div id="tab-log">
    <div class="filters">
      <button class="fbtn active" data-f="all">&#20840;&#37096;</button>
      <button class="fbtn" data-f="new_product">&#26032;&#21697;</button>
      <button class="fbtn" data-f="price_change">&#20215;&#26684;</button>
      <button class="fbtn" data-f="stock_change">&#24211;&#23384;</button>
      <button class="fbtn" data-f="removed_product">&#19979;&#26550;</button>
      <button class="fbtn" data-f="new_article">&#21338;&#23458;</button>
      <button class="fbtn" data-f="page_change">&#39029;&#38754;</button>
    </div>
    <div class="grid">
      <div>
        <div class="panel">
          <div class="ph"><div class="ptitle">&#21464;&#21270;&#26085;&#24535; <span class="badge b-gray" id="cnt">0</span></div><span style="font-size:12px;color:#78776f" id="brand-hint">&#25152;&#26377;&#21697;&#29260;</span></div>
          <div id="change-list"><div class="empty">&#26242;&#26080;&#35760;&#24405;</div></div>
        </div>
      </div>
      <div>
        <div class="panel">
          <div class="ph"><div class="ptitle">&#20851;&#38190;&#39029;&#38754;&#29366;&#24577;</div></div>
          <div id="page-list"><div class="empty">&#26242;&#26080;&#25968;&#25454;</div></div>
        </div>
        <div class="panel">
          <div class="ph"><div class="ptitle">&#21697;&#29260; / &#20135;&#21697;&#25968;</div></div>
          <div id="brand-sidebar"></div>
        </div>
      </div>
    </div>
  </div>
  <div id="tab-brands" class="hidden"><div id="brand-cards"></div></div>
</div>
<script>
let D=null,fType='all',fBrand='all';
const TXT={
  justNow:'\u521a\u521a',
  minAgo:' \u5206\u949f\u524d',
  hourAgo:' \u5c0f\u65f6\u524d',
  dayAgo:' \u5929\u524d',
  contentUpdated:'\u5185\u5bb9\u5df2\u66f4\u65b0',
  changesSuffix:' \u5904\u5185\u5bb9\u53d8\u5316',
  noRecords:'\u5f53\u524d\u7b5b\u9009\u6761\u4ef6\u4e0b\u6682\u65e0\u8bb0\u5f55',
  changed:'\u5df2\u53d8\u5316',
  error:'\u8bbf\u95ee\u5931\u8d25',
  unchanged:'\u672a\u53d8\u5316',
  noData:'\u6682\u65e0\u6570\u636e',
  noBrandRecords:'\u6682\u65e0\u8bb0\u5f55',
  allBrands:'\u6240\u6709\u54c1\u724c',
  products:' \u4ea7\u54c1',
  metaPrefix:'\u4e0a\u6b21\u68c0\u67e5\uff1a',
  monitorBrands:' / \u76d1\u63a7 ',
  brandUnit:' \u4e2a\u54c1\u724c',
  todayAlertPrefix:'\u4eca\u65e5\u68c0\u6d4b\u5230 ',
  todayAlertSuffix:' \u5904\u53d8\u5316\uff0c\u8bf7\u67e5\u770b\u4e0b\u65b9\u65e5\u5fd7\u3002',
  loadFailed:'\u65e0\u6cd5\u52a0\u8f7d\uff1a'
};
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function ago(iso){
  const d=(Date.now()-new Date(iso))/1000;
  if(d<60)return TXT.justNow;
  if(d<3600)return `${Math.floor(d/60)}${TXT.minAgo}`;
  if(d<86400)return `${Math.floor(d/3600)}${TXT.hourAgo}`;
  return `${Math.floor(d/86400)}${TXT.dayAgo}`;
}

function diffSummary(change){
  const detail=String(change.detail||'');
  const more=detail.match(/\.{3} and (\d+) more changes/i);
  const total=(change.diffs||[]).length+(more?Number(more[1]):0);
  return total>0?`${total}${TXT.changesSuffix}`:TXT.contentUpdated;
}

function switchTab(id,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-log').classList.toggle('hidden',id!=='log');
  document.getElementById('tab-brands').classList.toggle('hidden',id!=='brands');
}

function buildDiff(diffs,detail){
  if(!diffs||!diffs.length){
    if(detail&&detail.includes('Hash-only'))return'<div style="font-size:11px;color:#78776f;font-style:italic;margin-top:4px">Hash-only: diff unavailable</div>';
    return'';
  }
  return'<div class="diff-block">'+diffs.map(d=>{
    if(d.type==='added')return`<div class="diff-line diff-added">+ ${esc((d.text||'').substring(0,150))}</div>`;
    if(d.type==='removed')return`<div class="diff-line diff-removed">- ${esc((d.text||'').substring(0,150))}</div>`;
    if(d.type==='modified')return`<div class="diff-line diff-modified">~ ${esc((d.old||'').substring(0,100))}<br>&nbsp;&nbsp;-&gt; ${esc((d.new||'').substring(0,100))}</div>`;
    return'';
  }).join('')+'</div>';
}

function renderList(){
  if(!D)return;
  const list=(D.changes||[]).filter(c=>(fType==='all'||c.type===fType)&&(fBrand==='all'||c.brand===fBrand));
  const cnt=document.getElementById('cnt');
  cnt.textContent=list.length;
  cnt.className='badge '+(list.length?'b-amber':'b-gray');
  document.getElementById('change-list').innerHTML=list.length?list.map(c=>{
    const tag=c.label||'?';
    const title=c.url?`<a href="${esc(c.url)}" target="_blank" rel="noreferrer">${esc(c.title)}</a>`:esc(c.title);
    const summary=(c.diffs&&c.diffs.length)?diffSummary(c):String(c.detail||'').substring(0,200);
    const detail=summary?`<div class="idetail">${esc(summary)}</div>`:'';
    return`<div class="item"><span class="tag tag-${tag}">${tag}</span><div class="ibody"><div class="ibrand">${esc(c.brand)}</div><div class="iname">${title}</div>${detail}${buildDiff(c.diffs,c.detail)}</div><div class="itime">${c.ts?ago(c.ts):''}</div></div>`;
  }).join(''):`<div class="empty">${TXT.noRecords}</div>`;
}

function renderPages(){
  if(!D)return;
  const rows=[];
  for(const[brand,pages]of Object.entries(D.page_status||{})){
    for(const[name,info]of Object.entries(pages)){
      const cls=info.status==='changed'?'schanged':info.status==='error'?'serr':'sok';
      const lbl=info.status==='changed'?TXT.changed:info.status==='error'?TXT.error:TXT.unchanged;
      const link=info.url?`<a href="${esc(info.url)}" target="_blank" rel="noreferrer">${esc(name)}</a>`:esc(name);
      rows.push(`<div class="pr"><div><div class="pname">${link}</div><div class="pbrand">${esc(brand)}</div></div><span class="${cls}">${lbl}</span></div>`);
    }
  }
  document.getElementById('page-list').innerHTML=rows.join('')||`<div class="empty">${TXT.noData}</div>`;
}

function renderSidebar(){
  if(!D)return;
  const brands=D.brand_list||[],counts=D.product_counts||{};
  document.getElementById('brand-sidebar').innerHTML=brands.map(b=>
    `<div class="brand-row" onclick="filterBrand('${b}')"><span style="font-size:13px;font-weight:500;color:${fBrand===b?'#1d4ed8':'#1a1a18'}">${esc(b)}</span><span class="bcnt">${counts[b]??'-'}${TXT.products}</span></div>`
  ).join('');
}

function renderBrandCards(){
  if(!D)return;
  const brands=D.brand_list||[],counts=D.product_counts||{};
  document.getElementById('brand-cards').innerHTML=brands.map(b=>{
    const bc=(D.changes||[]).filter(c=>c.brand===b).slice(0,4);
    return`<div class="panel" style="margin-bottom:14px"><div class="ph"><div class="ptitle">${esc(b)}</div><span style="font-size:12px;color:#78776f">${counts[b]??'-'}${TXT.products}</span></div>${bc.length?bc.map(c=>{const tag=c.label||'?';const title=c.url?`<a href="${esc(c.url)}" target="_blank" rel="noreferrer">${esc(c.title)}</a>`:esc(c.title);const summary=(c.diffs&&c.diffs.length)?diffSummary(c):String(c.detail||'').substring(0,120);const detail=summary?`<div class="idetail">${esc(summary)}</div>`:'';return`<div class="item"><span class="tag tag-${tag}">${tag}</span><div class="ibody"><div class="iname">${title}</div>${detail}${buildDiff(c.diffs,c.detail)}</div><div class="itime">${c.ts?ago(c.ts):''}</div></div>`;}).join(''):`<div class="empty">${TXT.noBrandRecords}</div>`}</div>`;
  }).join('');
}

function filterBrand(b){
  fBrand=fBrand===b?'all':b;
  document.getElementById('brand-hint').textContent=fBrand==='all'?TXT.allBrands:fBrand;
  renderList();
  renderSidebar();
}

document.querySelector('.filters').addEventListener('click',e=>{
  const btn=e.target.closest('.fbtn');
  if(!btn)return;
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  fType=btn.dataset.f;
  renderList();
});

function render(data){
  D=data;
  const brands=data.brand_list||[],genAt=data.generated_at?new Date(data.generated_at):null;
  document.getElementById('meta').textContent=genAt?`${TXT.metaPrefix}${ago(data.generated_at)}${TXT.monitorBrands}${brands.length}${TXT.brandUnit}`:TXT.noData;
  document.getElementById('s-brands').textContent=brands.length||'-';
  document.getElementById('s-brands-sub').textContent=brands.join(' / ')||'-';
  document.getElementById('s-today').textContent=data.stats?.today??0;
  document.getElementById('s-week').textContent=data.stats?.week??0;
  document.getElementById('s-time').textContent=genAt?genAt.toLocaleDateString('zh-CN'):'-';
  const today=data.stats?.today??0;
  document.getElementById('alert').classList.toggle('hidden',today===0);
  if(today>0)document.getElementById('alert-text').textContent=`${TXT.todayAlertPrefix}${today}${TXT.todayAlertSuffix}`;
  renderList();
  renderPages();
  renderSidebar();
  renderBrandCards();
}

async function loadData(){
  try{
    const r=await fetch('data.json?t='+Date.now());
    if(!r.ok)throw new Error('HTTP '+r.status);
    render(await r.json());
  }catch(e){
    document.getElementById('meta').textContent=`${TXT.loadFailed}${e.message}`;
  }
}

loadData();
setInterval(loadData,5*60*1000);
</script>
</body>
</html>

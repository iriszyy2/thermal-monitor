# ─── State ────────────────────────────────────────────────────────────────────

def load_state() -> dict:
    if STATE_FILE.exists():
        try:
            return json.loads(STATE_FILE.read_text())
        except Exception:
            return {}
    return {}

def save_state(state: dict):
    STATE_FILE.write_text(json.dumps(state, indent=2, ensure_ascii=False))

def load_dashboard() -> dict:
    DATA_DIR.mkdir(exist_ok=True)
    if DATA_FILE.exists():
        try:
            return json.loads(DATA_FILE.read_text())
        except Exception:
            pass
    return {
        "generated_at": "",
        "brand_list": list(BRANDS.keys()),
        "stats": {"total": 0, "today": 0, "week": 0},
        "changes": [],
        "page_status": {},
        "product_counts": {},
    }

def save_dashboard(data: dict):
    DATA_DIR.mkdir(exist_ok=True)
    DATA_FILE.write_text(json.dumps(data, indent=2, ensure_ascii=False))

# ─── Hashing ──────────────────────────────────────────────────────────────────

def text_hash(html: str) -> str:
    """Extract visible text only — ignores scripts, styles, timestamps, ads."""
    # Remove scripts, styles, comments
    t = re.sub(r'<script[^>]*>.*?</script>', '', html, flags=re.DOTALL|re.IGNORECASE)
    t = re.sub(r'<style[^>]*>.*?</style>',  '', t,    flags=re.DOTALL|re.IGNORECASE)
    t = re.sub(r'<!--.*?-->',               '', t,    flags=re.DOTALL)
    # Remove all HTML tags
    t = re.sub(r'<[^>]+>', ' ', t)
    # Remove data attributes and timestamps (numbers that look like unix timestamps)
    t = re.sub(r'\b\d{10,13}\b', '', t)
    # Collapse whitespace
    t = ' '.join(t.split())
    return hashlib.sha256(t.encode()).hexdigest()[:24]

# ─── Fetchers ─────────────────────────────────────────────────────────────────

def fetch_shopify_products(api_url: str, base: str, client: httpx.Client) -> dict:
    products, page = {}, 1
    while True:
        try:
            r = client.get(f"{api_url}?limit=250&page={page}", timeout=20)
            r.raise_for_status()
            data = r.json().get("products", [])
        except Exception as e:
            print(f"    [warn] products p{page}: {e}")
            break
        if not data:
            break
        for p in data:
            handle = p["handle"]
            variant = next(
                (v for v in p.get("variants", []) if v.get("available")),
                p["variants"][0] if p.get("variants") else {}
            )
            raw = variant.get("price", "")
            try:
                price = f"{float(raw):.2f}" if raw else "N/A"
            except ValueError:
                price = raw or "N/A"
            products[handle] = {
                "title":     p["title"],
                "price":     price,
                "available": any(v.get("available") for v in p.get("variants", [])),
                "url":       f"{base}/products/{handle}",
            }
        page += 1
        if len(data) < 250:
            break
    return products

def fetch_shopify_blog(api_url: str, base: str, client: httpx.Client) -> dict:
    articles = {}
    try:
        r = client.get(api_url, timeout=20)
        r.raise_for_status()
        for a in r.json().get("articles", []):
            articles[str(a["id"])] = {
                "title":        a["title"],
                "published_at": a.get("published_at", ""),
                "url":          f"{base}/blogs/news/{a['handle']}",
            }
    except Exception as e:
        print(f"    [warn] blog: {e}")
    return articles

def fetch_page_hash(url: str, client: httpx.Client) -> str | None:
    try:
        r = client.get(url, timeout=25)
        r.raise_for_status()
        return text_hash(r.text)
    except Exception as e:
        print(f"    [warn] {url}: {e}")
        return None

# ─── Diff ─────────────────────────────────────────────────────────────────────

def ts() -> str:
    return datetime.now(timezone.utc).isoformat()

TYPE_LABEL = {
    "new_product":     "NEW",
    "removed_product": "REMOVED",
    "price_change":    "PRICE",
    "stock_change":    "STOCK",
    "new_article":     "BLOG",
    "page_change":     "PAGE",
}

def make_change(type_, brand, title, url, detail, price=""):
    return {
        "id":     f"{ts()}-{brand}-{type_}-{hashlib.md5(title.encode()).hexdigest()[:6]}",
        "type":   type_,
        "label":  TYPE_LABEL[type_],
        "brand":  brand,
        "ts":     ts(),
        "title":  title,
        "url":    url,
        "detail": detail,
        "price":  price,
    }

def diff_products(brand: str, old: dict, new: dict) -> list:
    changes = []
    for h in sorted(set(new) - set(old)):
        p = new[h]
        price_str = f"${p['price']}" if p['price'] != 'N/A' else "Price TBD"
        changes.append(make_change(
            "new_product", brand, p["title"], p["url"],
            f"{price_str} · {'In stock' if p['available'] else 'Out of stock'}",
            p["price"],
        ))
    for h in sorted(set(old) - set(new)):
        p = old[h]
        changes.append(make_change("removed_product", brand, p["title"], p.get("url",""), "Removed from store"))
    for h in sorted(set(old) & set(new)):
        o, n = old[h], new[h]
        if o["price"] != n["price"] and "N/A" not in (o["price"], n["price"]):
            try:
                op, np_ = float(o["price"]), float(n["price"])
                pct = (np_ - op) / op * 100
                changes.append(make_change(
                    "price_change", brand, n["title"], n["url"],
                    f"${o['price']} → ${n['price']} ({pct:+.1f}%)", n["price"],
                ))
            except ValueError:
                pass
        if o["available"] != n["available"]:
            changes.append(make_change(
                "stock_change", brand, n["title"], n["url"],
                "Back in stock" if n["available"] else "Out of stock", n["price"],
            ))
    return changes

def diff_blog(brand: str, old: dict, new: dict) -> list:
    return [
        make_change("new_article", brand, new[aid]["title"], new[aid].get("url",""),
                    f"Published {new[aid].get('published_at','')[:10]}")
        for aid in sorted(set(new) - set(old))
    ]

def diff_page(brand: str, name: str, old_h, new_h, url: str,
              last_alerted: str | None) -> list:
    if not old_h or not new_h or old_h == new_h:
        return []
    # Cooldown: don't re-alert the same page within 6 hours
    if last_alerted:
        try:
            last_dt = datetime.fromisoformat(last_alerted)
            if datetime.now(timezone.utc) - last_dt < timedelta(hours=PAGE_ALERT_COOLDOWN_HOURS):
                print(f"    [cooldown] {brand} {name} — skipping (alerted {last_alerted[:16]})")
                return []
        except Exception:
            pass
    return [make_change("page_change", brand, name, url, "Content updated")]

# ─── Dashboard update ─────────────────────────────────────────────────────────

def update_dashboard(dash: dict, new_changes: list, page_status: dict, product_counts: dict):
    now = datetime.now(timezone.utc)
    today_str   = now.strftime("%Y-%m-%d")
    week_ago_ts = (now - timedelta(days=7)).timestamp()

    dash["changes"] = (new_changes + dash.get("changes", []))[:MAX_HISTORY]
    dash["generated_at"]    = now.isoformat()
    dash["brand_list"]      = list(BRANDS.keys())
    dash["page_status"]     = page_status
    dash["product_counts"]  = product_counts

    all_changes = dash["changes"]
    today_count = sum(1 for c in all_changes if c.get("ts","")[:10] == today_str)
    week_count  = sum(
        1 for c in all_changes
        if c.get("ts") and
        datetime.fromisoformat(c["ts"].replace("Z","+00:00")).timestamp() >= week_ago_ts
    )
    dash["stats"] = {
        "total": len(all_changes),
        "today": today_count,
        "week":  week_count,
    }

# ─── Email ────────────────────────────────────────────────────────────────────

TAG_COLOR = {
    "NEW":"#16a34a","REMOVED":"#dc2626","PRICE":"#d97706",
    "STOCK":"#2563eb","BLOG":"#7c3aed","PAGE":"#0891b2",
}

def send_email(changes: list, run_time: str):
    smtp_host = os.getenv("SMTP_HOST", "smtp.gmail.com")
    smtp_port = int(os.getenv("SMTP_PORT", "587"))
    smtp_user = os.getenv("SMTP_USER", "")
    smtp_pass = os.getenv("SMTP_PASS", "")
    email_to  = os.getenv("EMAIL_TO", "")
    pages_url = os.getenv("PAGES_URL", "")

    if not all([smtp_user, smtp_pass, email_to]):
        print("  [email] skipped — SMTP not configured")
        return

    by_brand: dict[str, list] = {}
    for c in changes:
        by_brand.setdefault(c["brand"], []).append(c)

    # Plain text
    lines = [f"Competitive Monitor — {run_time}", "="*56]
    for brand, items in by_brand.items():
        lines += [f"\n{brand} ({len(items)} change{'s' if len(items)>1 else ''})", "-"*36]
        for c in items:
            lines += [f"  [{c['label']}] {c['title']}", f"         {c['detail']}"]
            if c.get("url"):
                lines.append(f"         {c['url']}")
    if pages_url:
        lines += [f"\nView dashboard: {pages_url}"]
    plain = "\n".join(lines)

    # HTML
    rows = ""
    for brand, items in by_brand.items():
        rows += (f'<tr><td colspan="3" style="padding:14px 0 6px;font-size:15px;'
                 f'font-weight:600;border-bottom:2px solid #e5e7eb">{brand} '
                 f'<span style="font-weight:400;font-size:12px;color:#6b7280">'
                 f'{len(items)} change{"s" if len(items)>1 else ""}</span></td></tr>')
        for c in items:
            color = TAG_COLOR.get(c["label"], "#6b7280")
            title = (f'<a href="{c["url"]}" style="color:#1d4ed8;text-decoration:none">'
                     f'{c["title"]}</a>') if c.get("url") else c["title"]
            rows += (f'<tr style="border-bottom:1px solid #f3f4f6">'
                     f'<td style="padding:9px 8px 9px 0;width:64px;vertical-align:top">'
                     f'<span style="background:{color}20;color:{color};font-size:11px;'
                     f'font-weight:700;padding:3px 7px;border-radius:4px">{c["label"]}</span></td>'
                     f'<td style="padding:9px 8px;font-size:14px;vertical-align:top">{title}</td>'
                     f'<td style="padding:9px 0 9px 8px;font-size:12px;color:#6b7280;'
                     f'vertical-align:top;white-space:nowrap">{c["detail"]}</td></tr>')

    dash_link = (f'<p style="margin-top:20px">'
                 f'<a href="{pages_url}" style="color:#1d4ed8">View full dashboard →</a></p>') if pages_url else ""
    html = f"""<!DOCTYPE html><html><body style="font-family:-apple-system,sans-serif;
max-width:660px;margin:0 auto;padding:24px;color:#111">
<div style="margin-bottom:18px">
  <div style="font-size:20px;font-weight:700">Competitive Monitor</div>
  <div style="font-size:12px;color:#9ca3af;margin-top:3px">{run_time} · {len(changes)} changes</div>
</div>
<table style="width:100%;border-collapse:collapse">{rows}</table>
{dash_link}
<div style="margin-top:20px;font-size:11px;color:#9ca3af;border-top:1px solid #e5e7eb;padding-top:10px">
TOPDON · FLIR · FLUKE · HIKIMICRO · Seek</div>
</body></html>"""

    msg = MIMEMultipart("alternative")
    msg["Subject"] = f"[Monitor] {len(changes)} change{'s' if len(changes)>1 else ''} — {run_time[:10]}"
    msg["From"] = smtp_user
    msg["To"]   = email_to
    msg.attach(MIMEText(plain, "plain"))
    msg.attach(MIMEText(html, "html"))
    try:
        with smtplib.SMTP(smtp_host, smtp_port) as s:
            s.ehlo(); s.starttls(); s.ehlo()
            s.login(smtp_user, smtp_pass)
            s.sendmail(smtp_user, email_to, msg.as_string())
        print(f"  [email] sent → {email_to}")
    except Exception as e:
        print(f"  [email] FAILED: {e}")

# ─── Main ─────────────────────────────────────────────────────────────────────

def run():
    run_time = datetime.now(timezone.utc).strftime("%Y-%m-%d %H:%M UTC")
    print(f"\n{'='*60}\nMonitor v4  {run_time}\n{'='*60}")

    state    = load_state()
    dash     = load_dashboard()
    is_first = len(state) == 0

    if is_first:
        print("\n>>> FIRST RUN — building baseline. No alerts sent.\n")

    all_changes:    list = []
    page_status:    dict = {}
    product_counts: dict = {}

    with httpx.Client(headers=HEADERS, follow_redirects=True) as client:
        for brand, cfg in BRANDS.items():
            print(f"\n[{brand}]")
            bs = state.setdefault(brand, {})
            page_status[brand] = {}

            if cfg["type"] == "shopify":
                print("  products...")
                new_p = fetch_shopify_products(cfg["products_api"], cfg["base"], client)
                old_p = bs.get("products", {})
                product_counts[brand] = len(new_p)
                if not is_first:
                    ch = diff_products(brand, old_p, new_p)
                    if ch: print(f"  → {len(ch)} product change(s)")
                    all_changes.extend(ch)
                else:
                    print(f"  → baseline: {len(new_p)} products")
                bs["products"] = new_p

                print("  blog...")
                new_b = fetch_shopify_blog(cfg["blog_api"], cfg["base"], client)
                if not is_first:
                    ch = diff_blog(brand, bs.get("blog", {}), new_b)
                    if ch: print(f"  → {len(ch)} new article(s)")
                    all_changes.extend(ch)
                bs["blog"] = new_b

            else:
                for key, url in [("products_hash", cfg["products_url"]),
                                  ("blog_hash",     cfg["blog_url"])]:
                    label = "Products" if "products" in key else "Blog"
                    print(f"  {label}...")
                    new_h = fetch_page_hash(url, client)
                    if not is_first:
                        ch = diff_page(brand, label, bs.get(key), new_h, url,
                                       bs.get(f"{key}_alerted"))
                        if ch:
                            all_changes.extend(ch)
                            bs[f"{key}_alerted"] = ts()
                    bs[key] = new_h

            # Key pages with cooldown
            ps = bs.setdefault("pages", {})
            pa = bs.setdefault("page_alerted", {})
            for pname, url in cfg["pages"].items():
                print(f"  {pname}...")
                new_h = fetch_page_hash(url, client)
                changed = False
                if not is_first and new_h:
                    ch = diff_page(brand, pname, ps.get(pname), new_h, url, pa.get(pname))
                    if ch:
                        changed = True
                        all_changes.extend(ch)
                        pa[pname] = ts()
                        print(f"  → {pname} changed!")
                page_status[brand][pname] = {
                    "url":        url,
                    "status":     "changed" if changed else ("ok" if new_h else "error"),
                    "checked_at": ts(),
                }
                if new_h:
                    ps[pname] = new_h

    save_state(state)
    update_dashboard(dash, all_changes, page_status, product_counts)
    save_dashboard(dash)
    print(f"\n  [dashboard] data.json written ({len(dash['changes'])} total records)")

    print(f"\n{'─'*60}")
    if is_first:
        print("Baseline saved. Monitoring active from next run.")
    elif all_changes:
        print(f"{len(all_changes)} change(s) detected:")
        for c in all_changes:
            print(f"  [{c['label']}] {c['brand']} · {c['title']} — {c['detail']}")
        send_email(all_changes, run_time)
    else:
        print("No changes. No email sent.")
    print(f"{'─'*60}\n")

if __name__ == "__main__":
    run()

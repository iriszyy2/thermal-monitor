<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>竞品监控 Dashboard</title>
<style>
  :root {
    --bg: #f8f7f4;
    --surface: #ffffff;
    --border: #e8e6e0;
    --border-soft: #f0ede8;
    --text: #1a1a1a;
    --text-muted: #6b6b6b;
    --text-faint: #9ca3af;
    --accent: #1a1a1a;
    --green: #16a34a; --green-bg: #dcfce7;
    --red: #dc2626;   --red-bg: #fee2e2;
    --amber: #b45309; --amber-bg: #fef3c7;
    --blue: #1d4ed8;  --blue-bg: #dbeafe;
    --purple: #7c3aed;--purple-bg: #f3e8ff;
    --teal: #0891b2;  --teal-bg: #e0f2fe;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; line-height: 1.5; }
  a { color: var(--blue); text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* Layout */
  .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 28px; display: flex; align-items: center; height: 56px; gap: 12px; }
  .topbar-dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; flex-shrink: 0; }
  .topbar-title { font-size: 15px; font-weight: 600; }
  .topbar-sub { font-size: 12px; color: var(--text-muted); }
  .topbar-right { margin-left: auto; display: flex; gap: 8px; }
  .btn { font-size: 12px; padding: 6px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--text); cursor: pointer; }
  .btn:hover { background: var(--bg); }

  .main { max-width: 1100px; margin: 0 auto; padding: 28px 24px; }

  /* Alert banner */
  .alert { background: #fffbeb; border: 1px solid #fcd34d; border-radius: 10px; padding: 12px 16px; display: flex; align-items: center; gap: 10px; margin-bottom: 24px; font-size: 13px; color: #92400e; }
  .alert.hidden { display: none; }

  /* Stats */
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 28px; }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
  .stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
  .stat-val { font-size: 26px; font-weight: 600; color: var(--text); }
  .stat-val.amber { color: var(--amber); }
  .stat-val.green { color: var(--green); font-size: 15px; padding-top: 4px; }
  .stat-sub { font-size: 11px; color: var(--text-faint); margin-top: 4px; }

  /* Tabs */
  .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
  .tab { padding: 8px 18px 12px; font-size: 13px; cursor: pointer; color: var(--text-muted); border-bottom: 2px solid transparent; margin-bottom: -1px; }
  .tab.active { color: var(--text); border-bottom-color: var(--text); font-weight: 500; }

  /* Panel */
  .panel { display: none; }
  .panel.active { display: block; }

  /* Two-col grid */
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

  /* Card */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px 18px; margin-bottom: 16px; }
  .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .card-title { font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .count-badge { font-size: 11px; padding: 2px 7px; border-radius: 10px; font-weight: 500; }
  .cb-amber { background: var(--amber-bg); color: var(--amber); }
  .cb-blue  { background: var(--blue-bg);  color: var(--blue); }
  .cb-green { background: var(--green-bg); color: var(--green); }
  .cb-gray  { background: var(--bg); color: var(--text-muted); }
  .card-label { font-size: 11px; color: var(--text-faint); }

  /* Change row */
  .change-row { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border-soft); }
  .change-row:last-child { border-bottom: none; padding-bottom: 0; }
  .tag { font-size: 10px; font-weight: 700; padding: 3px 7px; border-radius: 5px; white-space: nowrap; flex-shrink: 0; margin-top: 2px; letter-spacing: 0.03em; }
  .tag-NEW     { background: var(--green-bg);  color: var(--green); }
  .tag-REMOVED { background: var(--red-bg);    color: var(--red); }
  .tag-PRICE   { background: var(--amber-bg);  color: var(--amber); }
  .tag-STOCK   { background: var(--blue-bg);   color: var(--blue); }
  .tag-BLOG    { background: var(--purple-bg); color: var(--purple); }
  .tag-PAGE    { background: var(--teal-bg);   color: var(--teal); }
  .change-body { flex: 1; min-width: 0; }
  .change-name { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .change-detail { font-size: 12px; color: var(--text-muted); }
  .change-time { font-size: 11px; color: var(--text-faint); white-space: nowrap; flex-shrink: 0; }

  /* Page status rows */
  .page-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border-soft); font-size: 13px; }
  .page-row:last-child { border-bottom: none; }
  .status-ok      { font-size: 11px; padding: 2px 8px; border-radius: 8px; background: var(--green-bg); color: var(--green); }
  .status-changed { font-size: 11px; padding: 2px 8px; border-radius: 8px; background: var(--amber-bg); color: var(--amber); }

  /* Brands tab */
  .brand-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .brand-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
  .brand-name { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
  .brand-url  { font-size: 11px; color: var(--text-faint); font-family: monospace; margin-bottom: 12px; }
  .brand-stat { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-muted); padding: 4px 0; border-bottom: 1px solid var(--border-soft); }
  .brand-stat:last-child { border-bottom: none; }
  .brand-stat-val { font-weight: 500; color: var(--text); }

  /* Empty state */
  .empty { font-size: 13px; color: var(--text-faint); padding: 12px 0; }

  /* Loading */
  #loading { text-align: center; padding: 60px; color: var(--text-muted); font-size: 14px; }
  #app { display: none; }

  /* Last updated */
  .last-updated { font-size: 11px; color: var(--text-faint); margin-top: 32px; text-align: center; }

  @media (max-width: 680px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
    .two-col { grid-template-columns: 1fr; }
    .brand-grid { grid-template-columns: repeat(2, 1fr); }
    .topbar-sub { display: none; }
  }
</style>
</head>
<body>

<div id="loading">Loading dashboard data...</div>

<div id="app">
  <div class="topbar">
    <div class="topbar-dot" id="status-dot"></div>
    <div>
      <div class="topbar-title">竞品监控 Dashboard</div>
      <div class="topbar-sub" id="topbar-sub">—</div>
    </div>
    <div class="topbar-right">
      <button class="btn" onclick="location.reload()">刷新</button>
    </div>
  </div>

  <div class="main">
    <div class="alert hidden" id="alert-banner">
      <span style="font-size:16px">⚡</span>
      <span id="alert-text"></span>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-label">品牌监控数</div>
        <div class="stat-val" id="s-brands">—</div>
        <div class="stat-sub">全部运行中</div>
      </div>
      <div class="stat">
        <div class="stat-label">今日变化</div>
        <div class="stat-val amber" id="s-today">—</div>
        <div class="stat-sub">过去24小时</div>
      </div>
      <div class="stat">
        <div class="stat-label">累计变化</div>
        <div class="stat-val" id="s-total">—</div>
        <div class="stat-sub">监控期间合计</div>
      </div>
      <div class="stat">
        <div class="stat-label">系统状态</div>
        <div class="stat-val green" id="s-status">—</div>
        <div class="stat-sub" id="s-time">—</div>
      </div>
    </div>

    <div class="tabs">
      <div class="tab active" onclick="switchTab('changes')">变化日志</div>
      <div class="tab" onclick="switchTab('brands')">品牌概览</div>
    </div>

    <!-- Changes tab -->
    <div class="panel active" id="tab-changes">
      <div class="two-col">
        <div>
          <div class="card">
            <div class="card-header">
              <div class="card-title">产品变化 <span class="count-badge cb-amber" id="cnt-product">0</span></div>
              <span class="card-label">新品 · 价格 · 库存</span>
            </div>
            <div id="list-product"><div class="empty">暂无产品变化</div></div>
          </div>
          <div class="card">
            <div class="card-header">
              <div class="card-title">页面变化 <span class="count-badge cb-blue" id="cnt-page">0</span></div>
              <span class="card-label">政策 · FAQ · 关于</span>
            </div>
            <div id="list-page"><div class="empty">暂无页面变化</div></div>
          </div>
        </div>
        <div>
          <div class="card">
            <div class="card-header">
              <div class="card-title">博客更新 <span class="count-badge cb-blue" id="cnt-blog">0</span></div>
            </div>
            <div id="list-blog"><div class="empty">暂无博客更新</div></div>
          </div>
          <div class="card">
            <div class="card-header">
              <div class="card-title">已下架产品 <span class="count-badge cb-gray" id="cnt-removed">0</span></div>
            </div>
            <div id="list-removed"><div class="empty">暂无下架记录</div></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Brands tab -->
    <div class="panel" id="tab-brands">
      <div class="brand-grid" id="brand-grid"></div>
    </div>

    <div class="last-updated" id="last-updated"></div>
  </div>
</div>

<script>
const TYPE_TAG = {
  new_product: 'NEW', removed_product: 'REMOVED',
  price_change: 'PRICE', stock_change: 'STOCK',
  new_article: 'BLOG', page_change: 'PAGE'
};

function timeAgo(iso) {
  const diff = (Date.now() - new Date(iso)) / 1000;
  if (diff < 60)   return '刚刚';
  if (diff < 3600) return `${Math.floor(diff/60)}分钟前`;
  if (diff < 86400)return `${Math.floor(diff/3600)}小时前`;
  return `${Math.floor(diff/86400)}天前`;
}

function changeRow(c) {
  const tag = TYPE_TAG[c.type] || '?';
  const titleHtml = c.url
    ? `<a href="${c.url}" target="_blank" rel="noopener">${c.title}</a>`
    : c.title;
  return `<div class="change-row">
    <span class="tag tag-${tag}">${tag}</span>
    <div class="change-body">
      <div class="change-name">${titleHtml}</div>
      <div class="change-detail">${c.brand} · ${c.detail}</div>
    </div>
    <div class="change-time">${timeAgo(c.time)}</div>
  </div>`;
}

function renderList(containerId, items, countId) {
  const el = document.getElementById(containerId);
  const cnt = document.getElementById(countId);
  cnt.textContent = items.length;
  el.innerHTML = items.length
    ? items.map(changeRow).join('')
    : '<div class="empty">暂无记录</div>';
}

function switchTab(id) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    const ids = ['changes', 'brands'];
    t.classList.toggle('active', ids[i] === id);
  });
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
}

async function loadData() {
  try {
    const r = await fetch('data.json?t=' + Date.now());
    if (!r.ok) throw new Error('data.json not found');
    const d = await r.json();

    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'block';

    // Topbar
    const genAt = new Date(d.generated_at);
    document.getElementById('topbar-sub').textContent =
      `最后检查：${timeAgo(d.generated_at)} · 监控 ${d.stats.brands_monitored} 个品牌`;

    // Stats
    document.getElementById('s-brands').textContent = d.stats.brands_monitored;
    document.getElementById('s-today').textContent  = d.stats.changes_today;
    document.getElementById('s-total').textContent  = d.stats.total_changes;
    document.getElementById('s-status').textContent = d.is_first_run ? '基线中' : '正常';
    document.getElementById('s-time').textContent   =
      genAt.toLocaleDateString('zh-CN',{month:'2-digit',day:'2-digit'}) + ' ' +
      genAt.toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});

    // Alert banner
    const todayChanges = d.changes.filter(c => {
      const diff = (Date.now() - new Date(c.time)) / 1000;
      return diff < 86400;
    });
    if (todayChanges.length > 0 && !d.is_first_run) {
      const types = [...new Set(todayChanges.map(c => TYPE_TAG[c.type]))].join('、');
      document.getElementById('alert-text').innerHTML =
        `今日检测到 <strong>${todayChanges.length} 处新变化</strong>：${types}`;
      document.getElementById('alert-banner').classList.remove('hidden');
    }

    // Categorize changes
    const product  = d.changes.filter(c => ['new_product','price_change','stock_change'].includes(c.type));
    const removed  = d.changes.filter(c => c.type === 'removed_product');
    const blog     = d.changes.filter(c => c.type === 'new_article');
    const pages    = d.changes.filter(c => c.type === 'page_change');

    renderList('list-product', product.slice(0,20), 'cnt-product');
    renderList('list-removed', removed.slice(0,10), 'cnt-removed');
    renderList('list-blog',    blog.slice(0,10),    'cnt-blog');
    renderList('list-page',    pages.slice(0,10),   'cnt-page');

    // Brand grid
    const grid = document.getElementById('brand-grid');
    grid.innerHTML = Object.entries(d.brands).map(([name, info]) => {
      const brandChanges = d.changes.filter(c => c.brand === name);
      const todayBrand   = brandChanges.filter(c => (Date.now()-new Date(c.time))/1000 < 86400);
      return `<div class="brand-card">
        <div class="brand-name">${name}</div>
        <div class="brand-url">${info.base.replace('https://','')}</div>
        <div class="brand-stat"><span>今日变化</span><span class="brand-stat-val">${todayBrand.length}</span></div>
        <div class="brand-stat"><span>累计变化</span><span class="brand-stat-val">${brandChanges.length}</span></div>
        ${info.product_count ? `<div class="brand-stat"><span>产品数量</span><span class="brand-stat-val">${info.product_count}</span></div>` : ''}
        <div class="brand-stat"><span>状态</span><span class="brand-stat-val" style="color:var(--green)">运行中</span></div>
      </div>`;
    }).join('');

    document.getElementById('last-updated').textContent =
      `数据更新于 ${genAt.toLocaleString('zh-CN')} · 每30分钟自动刷新`;

  } catch(e) {
    document.getElementById('loading').textContent =
      'Dashboard 数据加载失败。请先运行一次 monitor.py 生成 data.json，或确认 GitHub Pages 已开启。';
    console.error(e);
  }
}

loadData();
setInterval(loadData, 5 * 60 * 1000); // auto-refresh every 5 min
</script>
</body>
</html>

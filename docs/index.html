<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>竞品监控</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f4ef;
  --card:#ffffff;
  --border:#e8e6df;
  --text:#1a1a18;
  --muted:#7a7870;
  --faint:#f0efe9;
  --green:#15803d;--green-bg:#dcfce7;
  --amber:#b45309;--amber-bg:#fef3c7;
  --red:#b91c1c;  --red-bg:#fee2e2;
  --blue:#1d4ed8; --blue-bg:#dbeafe;
  --purple:#6d28d9;--purple-bg:#ede9fe;
  --teal:#0e7490; --teal-bg:#cffafe;
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh}

/* ── Top bar ── */
.topbar{background:var(--card);border-bottom:1px solid var(--border);
  padding:0 24px;height:52px;display:flex;align-items:center;
  justify-content:space-between;position:sticky;top:0;z-index:10}
.topbar-left{display:flex;align-items:center;gap:9px}
.pulse{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0}
.topbar-title{font-size:15px;font-weight:600}
.topbar-meta{font-size:12px;color:var(--muted);margin-top:1px}
.topbar-right{display:flex;gap:8px}
.btn{font-size:12px;font-weight:500;padding:6px 14px;border-radius:8px;
  border:1px solid var(--border);background:var(--card);color:var(--text);
  cursor:pointer;transition:background .12s}
.btn:hover{background:var(--faint)}

/* ── Layout ── */
.page{max-width:1040px;margin:0 auto;padding:24px 20px}

/* ── Alert ── */
.alert{background:var(--amber-bg);border:1px solid #fcd34d;border-radius:10px;
  padding:10px 16px;display:flex;align-items:center;gap:9px;margin-bottom:20px;
  font-size:13px;color:var(--amber)}
.alert.hidden{display:none}
.alert-icon{font-size:14px;flex-shrink:0}

/* ── Stats ── */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:24px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 18px}
.stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:7px}
.stat-val{font-size:26px;font-weight:600;color:var(--text)}
.stat-val.amber{color:var(--amber)}
.stat-val.green{color:var(--green);font-size:16px;padding-top:4px}
.stat-sub{font-size:11px;color:var(--muted);margin-top:3px}

/* ── Tabs ── */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:20px}
.tab{font-size:13px;font-weight:500;padding:8px 16px 10px;color:var(--muted);
  cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .12s}
.tab.active{color:var(--text);border-bottom-color:var(--text)}

/* ── Main grid ── */
.grid{display:grid;grid-template-columns:1fr 300px;gap:16px}

/* ── Cards ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;
  overflow:hidden;margin-bottom:14px}
.card:last-child{margin-bottom:0}
.card-header{padding:12px 16px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px}
.card-hint{font-size:11px;color:var(--muted)}
.count-badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;
  background:var(--amber-bg);color:var(--amber)}
.count-badge.zero{background:var(--faint);color:var(--muted)}

/* ── Change items ── */
.change-item{display:flex;align-items:flex-start;gap:10px;padding:12px 16px;
  border-bottom:1px solid var(--faint);transition:background .1s;cursor:default}
.change-item:last-child{border-bottom:none}
.change-item:hover{background:var(--faint)}
.tag{font-size:10px;font-weight:700;padding:3px 7px;border-radius:5px;
  flex-shrink:0;margin-top:1px;letter-spacing:.02em}
.tag-NEW     {background:var(--green-bg); color:var(--green)}
.tag-REMOVED {background:var(--red-bg);   color:var(--red)}
.tag-PRICE   {background:var(--amber-bg); color:var(--amber)}
.tag-STOCK   {background:var(--blue-bg);  color:var(--blue)}
.tag-BLOG    {background:var(--purple-bg);color:var(--purple)}
.tag-PAGE    {background:var(--teal-bg);  color:var(--teal)}
.change-body{flex:1;min-width:0}
.change-brand{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:1px}
.change-title{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:1px}
.change-title a{color:var(--blue);text-decoration:none}
.change-title a:hover{text-decoration:underline}
.change-detail{font-size:12px;color:var(--muted)}
.change-time{font-size:11px;color:var(--muted);white-space:nowrap;flex-shrink:0;margin-top:2px}
.empty{padding:32px 16px;text-align:center;color:var(--muted);font-size:13px}

/* ── Right column ── */
.right{display:flex;flex-direction:column;gap:14px}

/* ── Page status ── */
.page-row{display:flex;align-items:center;justify-content:space-between;
  padding:9px 16px;border-bottom:1px solid var(--faint);font-size:13px}
.page-row:last-child{border-bottom:none}
.page-info{flex:1;min-width:0}
.page-name{color:var(--text);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.page-brand{font-size:11px;color:var(--muted)}
.status-ok     {font-size:11px;font-weight:600;color:var(--green);white-space:nowrap;margin-left:8px}
.status-changed{font-size:11px;font-weight:600;color:var(--amber);white-space:nowrap;margin-left:8px}
.status-error  {font-size:11px;font-weight:600;color:var(--red);white-space:nowrap;margin-left:8px}

/* ── Brands ── */
.brand-row{display:flex;align-items:center;justify-content:space-between;
  padding:9px 16px;border-bottom:1px solid var(--faint);cursor:pointer;transition:background .1s}
.brand-row:last-child{border-bottom:none}
.brand-row:hover{background:var(--faint)}
.brand-name{font-size:13px;font-weight:500}
.brand-cnt{font-size:11px;background:var(--faint);color:var(--muted);
  padding:2px 9px;border-radius:10px}

/* ── Filter strip ── */
.filters{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.filter-btn{font-size:12px;padding:4px 12px;border-radius:16px;
  border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer}
.filter-btn.active{background:var(--text);color:#fff;border-color:var(--text)}

#loading{text-align:center;padding:60px;color:var(--muted)}
.panel-hidden{display:none}

@media(max-width:720px){
  .stats{grid-template-columns:repeat(2,1fr)}
  .grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="pulse"></div>
    <div>
      <div class="topbar-title">竞品监控 Dashboard</div>
      <div class="topbar-meta" id="meta">加载中…</div>
    </div>
  </div>
  <div class="topbar-right">
    <button class="btn" onclick="loadData()">刷新</button>
  </div>
</div>

<div class="page">
  <div id="loading">正在加载数据…</div>
  <div id="app" style="display:none">

    <div class="alert hidden" id="alert-banner">
      <span class="alert-icon">⚡</span>
      <span id="alert-text"></span>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-label">监控品牌</div>
        <div class="stat-val" id="s-brands">—</div>
        <div class="stat-sub" id="s-brands-sub">—</div>
      </div>
      <div class="stat">
        <div class="stat-label">今日变化</div>
        <div class="stat-val amber" id="s-today">—</div>
        <div class="stat-sub">过去 24 小时</div>
      </div>
      <div class="stat">
        <div class="stat-label">本周变化</div>
        <div class="stat-val" id="s-week">—</div>
        <div class="stat-sub">过去 7 天</div>
      </div>
      <div class="stat">
        <div class="stat-label">系统状态</div>
        <div class="stat-val green" id="s-status">正常</div>
        <div class="stat-sub" id="s-time">—</div>
      </div>
    </div>

    <div class="tabs">
      <div class="tab active" onclick="switchTab('changes',this)">变化日志</div>
      <div class="tab" onclick="switchTab('brands',this)">品牌概览</div>
    </div>

    <!-- Changes tab -->
    <div id="tab-changes">
      <div class="filters" id="filters">
        <button class="filter-btn active" data-f="all">全部</button>
        <button class="filter-btn" data-f="new_product">新品</button>
        <button class="filter-btn" data-f="price_change">价格</button>
        <button class="filter-btn" data-f="stock_change">库存</button>
        <button class="filter-btn" data-f="removed_product">下架</button>
        <button class="filter-btn" data-f="new_article">博客</button>
        <button class="filter-btn" data-f="page_change">页面</button>
      </div>

      <div class="grid">
        <div>
          <div class="card">
            <div class="card-header">
              <div class="card-title">
                变化日志
                <span class="count-badge zero" id="change-count">0</span>
              </div>
              <div class="card-hint" id="brand-label">所有品牌</div>
            </div>
            <div id="change-list"><div class="empty">暂无变化记录</div></div>
          </div>
        </div>

        <div class="right">
          <div class="card">
            <div class="card-header"><div class="card-title">关键页面状态</div></div>
            <div id="page-list"><div class="empty">暂无数据</div></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Brands tab -->
    <div id="tab-brands" class="panel-hidden">
      <div class="grid">
        <div id="brand-cards"></div>
        <div></div>
      </div>
    </div>

  </div>
</div>

<script>
let D = null, activeFilter = 'all', activeBrand = 'all';

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function timeAgo(iso){
  const d = (Date.now()-new Date(iso))/1000;
  if(d<60) return '刚刚';
  if(d<3600) return Math.floor(d/60)+'分钟前';
  if(d<86400) return Math.floor(d/3600)+'小时前';
  return Math.floor(d/86400)+'天前';
}

function switchTab(id, el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-changes').classList.toggle('panel-hidden', id!=='changes');
  document.getElementById('tab-brands').classList.toggle('panel-hidden',  id!=='brands');
}

function renderChanges(){
  if(!D) return;
  const changes = (D.changes||[]).filter(c=>{
    const fOk = activeFilter==='all' || c.type===activeFilter;
    const bOk = activeBrand==='all'  || c.brand===activeBrand;
    return fOk && bOk;
  });
  const pill = document.getElementById('change-count');
  pill.textContent = changes.length;
  pill.className = 'count-badge'+(changes.length===0?' zero':'');

  document.getElementById('change-list').innerHTML = changes.length
    ? changes.map(c=>{
        const tag = c.label||'?';
        const title = c.url
          ? `<a href="${esc(c.url)}" target="_blank" rel="noopener">${esc(c.title)}</a>`
          : esc(c.title);
        return `<div class="change-item">
          <span class="tag tag-${tag}">${tag}</span>
          <div class="change-body">
            <div class="change-brand">${esc(c.brand)}</div>
            <div class="change-title">${title}</div>
            <div class="change-detail">${esc(c.detail)}</div>
          </div>
          <div class="change-time">${c.ts?timeAgo(c.ts):''}</div>
        </div>`;
      }).join('')
    : '<div class="empty">当前筛选条件下无记录</div>';
}

function renderPages(){
  if(!D) return;
  const rows = [];
  for(const [brand, pages] of Object.entries(D.page_status||{})){
    for(const [name, info] of Object.entries(pages)){
      const cls = info.status==='changed'?'status-changed':info.status==='error'?'status-error':'status-ok';
      const lbl = info.status==='changed'?'已变化':info.status==='error'?'访问失败':'未变化';
      const link = info.url
        ? `<a href="${esc(info.url)}" target="_blank" style="color:var(--text);text-decoration:none">${esc(name)}</a>`
        : esc(name);
      rows.push(`<div class="page-row">
        <div class="page-info"><div class="page-name">${link}</div>
        <div class="page-brand">${esc(brand)}</div></div>
        <span class="${cls}">${lbl}</span></div>`);
    }
  }
  document.getElementById('page-list').innerHTML = rows.length ? rows.join('') : '<div class="empty">暂无数据</div>';
}

function renderBrands(){
  if(!D) return;
  const brands = D.brand_list || [];
  const counts = D.product_counts || {};
  // Sidebar brand list
  document.getElementById('brand-list')&&(document.getElementById('brand-list').innerHTML =
    brands.map(b=>`<div class="brand-row" onclick="filterBrand('${b}')">
      <span class="brand-name" style="color:${activeBrand===b?'var(--blue)':'var(--text)'}">${esc(b)}</span>
      <span class="brand-cnt">${counts[b]??'—'} 产品</span>
    </div>`).join(''));

  // Brand overview cards
  document.getElementById('brand-cards').innerHTML = brands.map(b=>{
    const bChanges = (D.changes||[]).filter(c=>c.brand===b);
    const recent = bChanges.slice(0,3);
    return `<div class="card" style="margin-bottom:14px">
      <div class="card-header">
        <div class="card-title">${esc(b)}</div>
        <span class="card-hint">${counts[b]??'—'} 产品 · ${bChanges.length} 条记录</span>
      </div>
      ${recent.length ? recent.map(c=>`<div class="change-item">
        <span class="tag tag-${c.label||'?'}">${c.label||'?'}</span>
        <div class="change-body">
          <div class="change-title">${c.url?`<a href="${esc(c.url)}" target="_blank">${esc(c.title)}</a>`:esc(c.title)}</div>
          <div class="change-detail">${esc(c.detail)}</div>
        </div>
        <div class="change-time">${c.ts?timeAgo(c.ts):''}</div>
      </div>`).join('') : '<div class="empty">暂无记录</div>'}
    </div>`;
  }).join('');
}

function filterBrand(b){
  activeBrand = activeBrand===b?'all':b;
  document.getElementById('brand-label').textContent = activeBrand==='all'?'所有品牌':activeBrand;
  renderChanges();
  renderBrands();
}

document.getElementById('filters').addEventListener('click',e=>{
  const btn = e.target.closest('.filter-btn');
  if(!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  activeFilter = btn.dataset.f;
  renderChanges();
});

function render(data){
  D = data;
  document.getElementById('loading').style.display='none';
  document.getElementById('app').style.display='block';

  const genAt = data.generated_at?new Date(data.generated_at):null;
  const brands = data.brand_list||[];

  document.getElementById('meta').textContent = genAt
    ? `上次检查：${timeAgo(data.generated_at)} · 监控 ${brands.length} 个品牌`
    : '暂无数据';
  document.getElementById('s-brands').textContent     = brands.length||'—';
  document.getElementById('s-brands-sub').textContent = brands.join(' · ')||'—';
  document.getElementById('s-today').textContent      = data.stats?.today??0;
  document.getElementById('s-week').textContent       = data.stats?.week??0;
  document.getElementById('s-time').textContent       = genAt?genAt.toLocaleDateString('zh-CN'):'—';

  const today = data.stats?.today??0;
  const banner = document.getElementById('alert-banner');
  if(today>0){
    banner.classList.remove('hidden');
    document.getElementById('alert-text').textContent = `今日检测到 ${today} 处变化，请查看下方日志。`;
  } else {
    banner.classList.add('hidden');
  }

  renderChanges();
  renderPages();
  renderBrands();
}

async function loadData(){
  try{
    const r = await fetch('data.json?t='+Date.now());
    if(!r.ok) throw new Error('HTTP '+r.status);
    render(await r.json());
  }catch(e){
    document.getElementById('loading').innerHTML=
      `<div style="color:var(--red);font-size:13px">无法加载 data.json：${e.message}</div>`;
    document.getElementById('loading').style.display='block';
    document.getElementById('app').style.display='none';
  }
}

loadData();
setInterval(loadData, 5*60*1000);
</script>
</body>
</html>
